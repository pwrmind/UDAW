<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CYBER-DAW v2 // Plugin-Based Step Sequencer</title>
<style>
  :root {
    --bg-main: #030305;
    --bg-panel: #0a0a0f;
    --bg-element: #14141f;
    --border-color: #222233;
    --neon-cyan: #00f3ff;
    --neon-magenta: #ff0055;
    --neon-green: #39ff14;
    --neon-orange: #ff9900;
    --text-dim: #555577;
    --text-light: #8888aa;
    --font-mono: 'Courier New', Courier, monospace;
  }
  body {
    background: var(--bg-main);
    background-image: radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.05) 0%, transparent 50%);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; margin: 0;
    font-family: var(--font-mono); color: #fff;
    overflow-x: hidden;
  }
  @media (max-width: 800px) { body { padding: 10px; } }
</style>

<x-sequencer></x-sequencer>

<script type="module">
// ==========================================
// PLUGIN REGISTRY
// ==========================================
class PluginRegistry {
  constructor() { this.plugins = new Map(); }
  register(plugin) {
    if (!plugin.id || !plugin.trigger) throw new Error('Invalid plugin: missing id or trigger');
    this.plugins.set(plugin.id, plugin);
    console.log(`✅ Plugin registered: ${plugin.name}`);
  }
  get(id) { return this.plugins.get(id); }
  getAll() { return Array.from(this.plugins.values()); }
  getByCategory(cat) { return this.getAll().filter(p => p.category === cat); }
}

window.CYBER_DAW = window.CYBER_DAW || {};
window.CYBER_DAW.registry = new PluginRegistry();

// ==========================================
// AUDIO EFFECTS
// ==========================================
class DelayEffect {
  constructor(ctx) {
    this.ctx = ctx; this.input = ctx.createGain(); this.output = ctx.createGain();
    this.delay = ctx.createDelay(2.0); this.fb = ctx.createGain(); this.wet = ctx.createGain(); this.dry = ctx.createGain();
    this.input.connect(this.dry); this.dry.connect(this.output);
    this.input.connect(this.delay); this.delay.connect(this.wet); this.wet.connect(this.output);
    this.delay.connect(this.fb); this.fb.connect(this.delay);
    this.set('time', 300); this.set('feedback', 40); this.set('mix', 20);
  }
  set(p, v) {
    const t = this.ctx.currentTime;
    if (p === 'time') this.delay.delayTime.linearRampToValueAtTime(v/1000, t+0.05);
    if (p === 'feedback') this.fb.gain.linearRampToValueAtTime(v/100, t+0.05);
    if (p === 'mix') {
      const m = v/100;
      this.dry.gain.linearRampToValueAtTime(1-m, t+0.05);
      this.wet.gain.linearRampToValueAtTime(m, t+0.05);
    }
  }
}

// ==========================================
// SEQUENCER SCHEDULER
// ==========================================
class SequencerScheduler {
  constructor(ctx, cb) {
    this.ctx = ctx; this.cb = cb; this.bpm = 120; this.on = false; this.t = 0; this.step = 0;
    this.maxSteps = 16;
  }
  start() { if (this.on) return; this.on = true; this.step = 0; this.t = this.ctx.currentTime; this._loop(); }
  stop() { this.on = false; clearTimeout(this.timer); }
  _loop() {
    while (this.t < this.ctx.currentTime + 0.1) { this.cb(this.step, this.t); this._next(); }
    this.timer = setTimeout(() => this._loop(), 25);
  }
  _next() {
    this.t += 0.25 * (60/this.bpm);
    this.step = (this.step + 1) % this.maxSteps;
  }
}

// ==========================================
// UI COMPONENTS
// ==========================================

// XKnob — улучшенная ручка с taper, unit, color
class XKnob extends HTMLElement {
  static get observedAttributes() { return ['min','max','value','label','taper','unit','color','default']; }
  constructor() {
    super();
    this.attachShadow({mode:'open'});
    this.taper = 'linear';
    this.color = '#00f3ff';
    this.unit = '';
    this._default = undefined;
  }
  connectedCallback() { this._updateProps(); this.render(); this._setupEvents(); }
  attributeChangedCallback() { this._updateProps(); this._updateVisuals(); }
  _updateProps() {
    this.min = parseFloat(this.getAttribute('min')) || 0;
    this.max = parseFloat(this.getAttribute('max')) || 100;
    this.label = this.getAttribute('label') || '';
    this.unit = this.getAttribute('unit') || '';
    this.taper = this.getAttribute('taper') || 'linear';
    this.color = this.getAttribute('color') || '#00f3ff';
    const def = parseFloat(this.getAttribute('default'));
    if (!isNaN(def)) this._default = def;
    const rawVal = parseFloat(this.getAttribute('value'));
    if (!isNaN(rawVal)) this._rawValue = rawVal;
    if (this._rawValue === undefined) this._rawValue = this._default !== undefined ? this._default : this.min;
  }
  get value() { return this._rawValue; }
  set value(v) { this._rawValue = Math.max(this.min, Math.min(this.max, v)); this._updateVisuals(); }
  _posToValue(pos) {
    switch (this.taper) {
      case 'exp': return this.min * Math.pow(this.max / this.min, pos);
      case 'log': return this.min + (this.max - this.min) * (Math.exp(pos * 3) - 1) / (Math.E ** 3 - 1);
      default: return this.min + pos * (this.max - this.min);
    }
  }
  _valueToPos(v) {
    switch (this.taper) {
      case 'exp': return Math.log(v / this.min) / Math.log(this.max / this.min);
      case 'log': return Math.log(1 + (v - this.min) * (Math.E ** 3 - 1) / (this.max - this.min)) / 3;
      default: return (v - this.min) / (this.max - this.min);
    }
  }
  _setupEvents() {
    const knob = this.shadowRoot.querySelector('.knob-circle');
    if (!knob) return;
    const onMove = (e) => {
      const deltaY = this._startY - (e.clientY || e.touches[0].clientY);
      const pos = Math.max(0, Math.min(1, this._startPos + deltaY / 150));
      this._rawValue = this._posToValue(pos);
      this._updateVisuals();
      this.dispatchEvent(new CustomEvent('input', { detail: { id: this.id, value: this._rawValue }, bubbles: true, composed: true }));
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp);
    };
    const onStart = (e) => {
      e.preventDefault();
      this._startY = e.clientY || e.touches[0].clientY;
      this._startPos = this._valueToPos(this._rawValue);
      document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
      document.addEventListener('touchmove', onMove, {passive:false}); document.addEventListener('touchend', onUp);
    };
    knob.addEventListener('mousedown', onStart);
    knob.addEventListener('touchstart', onStart, {passive:false});
    knob.addEventListener('dblclick', () => {
      if (this._default !== undefined) {
        this._rawValue = this._default;
        this._updateVisuals();
        this.dispatchEvent(new CustomEvent('input', { detail: { id: this.id, value: this._rawValue }, bubbles: true, composed: true }));
      }
    });
  }
  _updateVisuals() {
    const pointer = this.shadowRoot.querySelector('.pointer');
    const valEl = this.shadowRoot.querySelector('.val');
    const arc = this.shadowRoot.querySelector('.arc');
    if (!pointer || !valEl) return;
    const pos = this._valueToPos(this._rawValue);
    const deg = -135 + pos * 270;
    pointer.style.transform = `rotate(${deg}deg)`;
    pointer.style.background = this.color;
    pointer.style.boxShadow = `0 0 4px ${this.color}`;
    let display;
    if (this._rawValue >= 1000) display = (this._rawValue/1000).toFixed(1) + 'k';
    else if (this._rawValue < 1 && this._rawValue > 0) display = this._rawValue.toFixed(2);
    else display = Math.round(this._rawValue);
    valEl.textContent = display + (this.unit ? ' ' + this.unit : '');
    if (arc) {
      const endAngle = -225 + pos * 270;
      arc.setAttribute('d', this._describeArc(13, 13, 11, -225, endAngle));
      arc.style.stroke = this.color;
    }
  }
  _describeArc(x, y, r, startAngle, endAngle) {
    const start = this._polarToCartesian(x, y, r, endAngle);
    const end = this._polarToCartesian(x, y, r, startAngle);
    const largeArc = endAngle - startAngle <= 180 ? "0" : "1";
    return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y}`;
  }
  _polarToCartesian(cx, cy, r, angle) {
    const rad = (angle - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }
  render() {
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-flex; flex-direction: column; align-items: center; width: 48px; user-select: none; }
        .label { font-size: 8px; color: var(--text-dim); margin-bottom: 2px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        .knob-wrap { position: relative; width: 32px; height: 32px; }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .arc { fill: none; stroke-width: 2; stroke-linecap: round; opacity: 0.8; }
        .track { fill: none; stroke: #222; stroke-width: 2; }
        .knob-circle { width: 26px; height: 26px; background: radial-gradient(circle at 30% 30%, #2a2a3a, #0a0a14); 
                       border: 1px solid #333; border-radius: 50%; position: absolute; top: 3px; left: 3px;
                       cursor: ns-resize; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 2px rgba(0,0,0,0.5); }
        .pointer { width: 2px; height: 10px; background: var(--neon-cyan); position: absolute; 
                   top: 2px; left: 12px; transform-origin: bottom center; border-radius: 1px; }
        .val { font-size: 9px; color: var(--text-light); margin-top: 3px; font-weight: bold; 
               font-variant-numeric: tabular-nums; min-width: 40px; text-align: center; }
      </style>
      <div class="label">${this.label}</div>
      <div class="knob-wrap">
        <svg viewBox="0 0 26 26">
          <path class="track" d="${this._describeArc(13, 13, 11, -225, 45)}"/>
          <path class="arc" d=""/>
        </svg>
        <div class="knob-circle"><div class="pointer"></div></div>
      </div>
      <div class="val">0</div>`;
    this._updateVisuals();
  }
}
customElements.define('x-knob', XKnob);

// XSelect — выпадающий список
class XSelect extends HTMLElement {
  static get observedAttributes() { return ['options','value','label']; }
  constructor() { super(); this.attachShadow({mode:'open'}); this._options = []; }
  connectedCallback() {
    const raw = this.getAttribute('options');
    if (raw) { try { this._options = JSON.parse(raw); } catch(e) {} }
    this.render();
    this.shadowRoot.querySelector('select').addEventListener('change', (e) => {
      this.dispatchEvent(new CustomEvent('input', { detail: { id: this.id, value: e.target.value }, bubbles: true, composed: true }));
    });
  }
  render() {
    const label = this.getAttribute('label') || '';
    const value = this.getAttribute('value') || '';
    const opts = this._options.map(o => {
      const val = typeof o === 'string' ? o : o.value;
      const lbl = typeof o === 'string' ? o : (o.label || o.value);
      const sel = val === value ? 'selected' : '';
      return `<option value="${val}" ${sel}>${lbl}</option>`;
    }).join('');
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .label { font-size: 8px; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        select { background: #14141f; color: var(--neon-cyan); border: 1px solid var(--border-color);
                 padding: 4px 6px; font-family: var(--font-mono); font-size: 10px; font-weight: bold;
                 border-radius: 3px; outline: none; cursor: pointer; min-width: 70px; }
        select:hover { border-color: var(--neon-cyan); box-shadow: 0 0 4px rgba(0,243,255,0.3); }
        option { background: #0a0a0f; color: #fff; }
      </style>
      <div class="label">${label}</div>
      <select>${opts}</select>`;
  }
}
customElements.define('x-select', XSelect);

// XToggle — переключатель
class XToggle extends HTMLElement {
  static get observedAttributes() { return ['value','label']; }
  constructor() { super(); this.attachShadow({mode:'open'}); this._on = false; }
  connectedCallback() {
    this._on = this.getAttribute('value') === 'true';
    this.render();
    this.shadowRoot.querySelector('.switch').addEventListener('click', () => {
      this._on = !this._on;
      this._updateVisuals();
      this.dispatchEvent(new CustomEvent('input', { detail: { id: this.id, value: this._on }, bubbles: true, composed: true }));
    });
  }
  _updateVisuals() {
    const sw = this.shadowRoot.querySelector('.switch');
    const led = this.shadowRoot.querySelector('.led');
    if (sw) sw.classList.toggle('on', this._on);
    if (led) led.classList.toggle('on', this._on);
  }
  render() {
    const label = this.getAttribute('label') || '';
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-flex; flex-direction: column; align-items: center; gap: 3px; user-select: none; }
        .label { font-size: 8px; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        .switch { width: 28px; height: 14px; background: #14141f; border: 1px solid #333;
                  border-radius: 7px; position: relative; cursor: pointer; transition: all 0.15s; }
        .switch::after { content: ''; position: absolute; width: 10px; height: 10px; background: #555;
                         border-radius: 50%; top: 1px; left: 1px; transition: all 0.15s; }
        .switch.on { background: rgba(0,243,255,0.15); border-color: var(--neon-cyan); }
        .switch.on::after { left: 15px; background: var(--neon-cyan); box-shadow: 0 0 6px var(--neon-cyan); }
        .led { width: 4px; height: 4px; border-radius: 50%; background: #333; }
        .led.on { background: var(--neon-cyan); box-shadow: 0 0 4px var(--neon-cyan); }
      </style>
      <div class="label">${label}</div>
      <div class="switch"><div class="led"></div></div>`;
    this._updateVisuals();
  }
}
customElements.define('x-toggle', XToggle);

// XEnvelope — ADSR-редактор
class XEnvelope extends HTMLElement {
  static get observedAttributes() { return ['value','label']; }
  constructor() {
    super();
    this.attachShadow({mode:'open'});
    this._env = { a: 10, d: 200, s: 0.7, r: 300 };
  }
  connectedCallback() {
    const raw = this.getAttribute('value');
    if (raw) { try { this._env = JSON.parse(raw); } catch(e) {} }
    this.render();
    this._setupDrag();
  }
  _emit() {
    this.dispatchEvent(new CustomEvent('input', { detail: { id: this.id, value: {...this._env} }, bubbles: true, composed: true }));
  }
  _setupDrag() {
    const svg = this.shadowRoot.querySelector('svg');
    let dragging = null;
    const getPoint = (e) => {
      const rect = svg.getBoundingClientRect();
      const x = (e.clientX || e.touches[0].clientX) - rect.left;
      const y = (e.clientY || e.touches[0].clientY) - rect.top;
      return { x: Math.max(0, Math.min(1, x / rect.width)), y: Math.max(0, Math.min(1, y / rect.height)) };
    };
    const onMove = (e) => {
      if (!dragging) return;
      e.preventDefault();
      const p = getPoint(e);
      if (dragging === 'A') this._env.a = Math.max(1, p.x * 2000);
      else if (dragging === 'D') { this._env.d = Math.max(1, p.x * 2000); this._env.s = 1 - p.y; }
      else if (dragging === 'S') this._env.s = 1 - p.y;
      else if (dragging === 'R') this._env.r = Math.max(1, p.x * 2000);
      this._draw();
      this._emit();
    };
    const onUp = () => {
      dragging = null;
      document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp);
    };
    ['A','D','S','R'].forEach(key => {
      const el = this.shadowRoot.querySelector(`.handle-${key}`);
      if (!el) return;
      const start = (e) => {
        e.preventDefault();
        dragging = key;
        document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove, {passive:false}); document.addEventListener('touchend', onUp);
      };
      el.addEventListener('mousedown', start);
      el.addEventListener('touchstart', start, {passive:false});
    });
  }
  _draw() {
    const svg = this.shadowRoot.querySelector('svg');
    const w = 160, h = 60;
    const total = this._env.a + this._env.d + 200 + this._env.r;
    const scale = w / total;
    const xA = this._env.a * scale;
    const xD = xA + this._env.d * scale;
    const xS = xD + 200 * scale;
    const xR = xS + this._env.r * scale;
    const yS = h - this._env.s * h;
    const path = `M 0 ${h} L ${xA} 0 L ${xD} ${yS} L ${xS} ${yS} L ${xR} ${h}`;
    svg.querySelector('.env-path').setAttribute('d', path);
    svg.querySelector('.handle-A').setAttribute('cx', xA); svg.querySelector('.handle-A').setAttribute('cy', 0);
    svg.querySelector('.handle-D').setAttribute('cx', xD); svg.querySelector('.handle-D').setAttribute('cy', yS);
    svg.querySelector('.handle-S').setAttribute('cx', xS); svg.querySelector('.handle-S').setAttribute('cy', yS);
    svg.querySelector('.handle-R').setAttribute('cx', xR); svg.querySelector('.handle-R').setAttribute('cy', h);
    this.shadowRoot.querySelector('.info').innerHTML = `A:${Math.round(this._env.a)} D:${Math.round(this._env.d)} S:${this._env.s.toFixed(2)} R:${Math.round(this._env.r)}`;
  }
  render() {
    const label = this.getAttribute('label') || 'ENVELOPE';
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-block; user-select: none; }
        .wrap { background: #0a0a0f; border: 1px solid var(--border-color); border-radius: 4px; padding: 6px; }
        .label { font-size: 8px; color: var(--neon-magenta); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; letter-spacing: 1px; }
        svg { display: block; background: #050508; border-radius: 2px; cursor: crosshair; }
        .env-path { fill: none; stroke: var(--neon-cyan); stroke-width: 1.5; filter: drop-shadow(0 0 3px var(--neon-cyan)); }
        .handle { fill: var(--neon-magenta); cursor: grab; filter: drop-shadow(0 0 3px var(--neon-magenta)); }
        .handle:hover { r: 5; }
        .info { font-size: 8px; color: var(--text-light); margin-top: 4px; font-family: var(--font-mono); text-align: center; letter-spacing: 1px; }
      </style>
      <div class="wrap">
        <div class="label">${label}</div>
        <svg width="160" height="60" viewBox="0 0 160 60">
          <path class="env-path" d="M 0 60 L 0 60"/>
          <circle class="handle handle-A" r="4"/>
          <circle class="handle handle-D" r="4"/>
          <circle class="handle handle-S" r="4"/>
          <circle class="handle handle-R" r="4"/>
        </svg>
        <div class="info">A:0 D:0 S:0 R:0</div>
      </div>`;
    this._draw();
  }
}
customElements.define('x-envelope', XEnvelope);

// XWaveformPreview — превью формы волны
class XWaveformPreview extends HTMLElement {
  static get observedAttributes() { return ['wave','freq']; }
  constructor() { super(); this.attachShadow({mode:'open'}); this._raf = null; }
  connectedCallback() { this.render(); this._animate(); }
  disconnectedCallback() { if (this._raf) cancelAnimationFrame(this._raf); }
  _animate() {
    const canvas = this.shadowRoot.querySelector('canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const wave = this.getAttribute('wave') || 'sine';
    const freq = parseFloat(this.getAttribute('freq')) || 2;
    let phase = 0;
    const draw = () => {
      ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = '#00f3ff'; ctx.lineWidth = 1.5;
      ctx.shadowColor = '#00f3ff'; ctx.shadowBlur = 4;
      ctx.beginPath();
      for (let x = 0; x < w; x++) {
        const t = (x / w) * Math.PI * 2 * freq + phase;
        let y;
        switch (wave) {
          case 'sawtooth': y = ((t / Math.PI) % 2) - 1; break;
          case 'square': y = Math.sin(t) > 0 ? 1 : -1; break;
          case 'triangle': y = 2 * Math.abs(2 * ((t / Math.PI / 2) % 1) - 1) - 1; break;
          default: y = Math.sin(t);
        }
        const py = h/2 - y * h/2 * 0.8;
        if (x === 0) ctx.moveTo(x, py); else ctx.lineTo(x, py);
      }
      ctx.stroke();
      phase += 0.05;
      this._raf = requestAnimationFrame(draw);
    };
    draw();
  }
  render() {
    this.shadowRoot.innerHTML = `
      <style>
        canvas { display: block; border: 1px solid var(--border-color); border-radius: 3px; background: #050508; }
      </style>
      <canvas width="80" height="30"></canvas>`;
  }
}
customElements.define('x-waveform-preview', XWaveformPreview);

// XLedButton
class XLedButton extends HTMLElement {
  static get observedAttributes() { return ['active', 'label']; }
  constructor() { super(); this.attachShadow({mode:'open'}); }
  connectedCallback() { this.render(); this.shadowRoot.querySelector('.btn').addEventListener('click', () => {
    this.toggleAttribute('active');
    this.dispatchEvent(new CustomEvent('change', {detail:{active:this.hasAttribute('active')}, bubbles:true, composed:true}));
  }); }
  attributeChangedCallback() {
    const btn = this.shadowRoot?.querySelector('.btn');
    const led = this.shadowRoot?.querySelector('.led');
    if(btn) btn.classList.toggle('active', this.hasAttribute('active'));
    if(led) led.classList.toggle('active', this.hasAttribute('active'));
  }
  render() {
    const label = this.getAttribute('label') || 'M';
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-block; user-select: none; }
        .btn { display: flex; align-items: center; gap: 4px; background: #1a1a26; border: 1px solid var(--border-color); border-radius: 3px; color: var(--text-dim); padding: 2px 6px; font-size: 9px; cursor: pointer; font-weight: bold; font-family: var(--font-mono); }
        .btn.active { color: #fff; border-color: var(--neon-magenta); }
        .led { width: 5px; height: 5px; background: #333; border-radius: 50%; }
        .led.active { background: var(--neon-magenta); box-shadow: 0 0 6px var(--neon-magenta); }
      </style>
      <div class="btn"><div class="led"></div><span>${label}</span></div>`;
    this.attributeChangedCallback();
  }
}
customElements.define('x-led-button', XLedButton);

// XPad
class XPad extends HTMLElement {
  static get observedAttributes() { return ['active', 'playing', 'color-group']; }
  constructor() { super(); this.attachShadow({mode:'open'}); }
  connectedCallback() { this.render(); this.shadowRoot.querySelector('.pad').addEventListener('click', () => {
    this.toggleAttribute('active');

// XTempoControl
class XTempoControl extends HTMLElement {
  static get observedAttributes() { return ['value']; }
  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this.bpm = 120; this.minBpm = 60; this.maxBpm = 200; this.tapTimes = [];
  }
  connectedCallback() {
    this.bpm = parseInt(this.getAttribute('value')) || 120;
    this.render();
    this.setupEvents();
  }
  attributeChangedCallback(name, oldValue, newValue) {
    if (name === 'value' && oldValue !== newValue) {
      this.bpm = Math.max(this.minBpm, Math.min(this.maxBpm, parseInt(newValue) || 120));
      this.updateDisplay();
    }
  }
  setupEvents() {
    const root = this.shadowRoot;
    root.querySelector('#bpm-up').addEventListener('click', () => this.changeBpm(1));
    root.querySelector('#bpm-down').addEventListener('click', () => this.changeBpm(-1));
    root.querySelector('#bpm-tap').addEventListener('click', () => {
      const now = performance.now();
      if (this.tapTimes.length > 0 && now - this.tapTimes[this.tapTimes.length - 1] > 2000) this.tapTimes = [];
      this.tapTimes.push(now);
      if (this.tapTimes.length >= 2) {
        let totalDeltas = 0;
        for (let i = 1; i < this.tapTimes.length; i++) totalDeltas += (this.tapTimes[i] - this.tapTimes[i - 1]);
        const averageDelta = totalDeltas / (this.tapTimes.length - 1);
        const calculatedBpm = Math.round(60000 / averageDelta);
        if (calculatedBpm >= this.minBpm && calculatedBpm <= this.maxBpm) {
          this.bpm = calculatedBpm;
          this.updateDisplay();
          this.emitBpmChange();
        }
      }
      if (this.tapTimes.length > 4) this.tapTimes.shift();
    });
  }
  changeBpm(amount) {
    const newBpm = this.bpm + amount;
    if (newBpm >= this.minBpm && newBpm <= this.maxBpm) {
      this.bpm = newBpm;
      this.updateDisplay();
      this.emitBpmChange();
    }
  }
  updateDisplay() {
    const display = this.shadowRoot.querySelector('.lcd-value');
    if (display) display.textContent = String(this.bpm).padStart(3, '0');
  }
  emitBpmChange() {
    this.dispatchEvent(new CustomEvent('bpm-change', { detail: { bpm: this.bpm }, bubbles: true, composed: true }));
  }
  render() {
    this.shadowRoot.innerHTML = `

        :host { display: inline-block; font-family: 'Courier New', monospace; user-select: none; }

class XMasterBar extends HTMLElement {
  constructor() { super(); this.attachShadow({mode:'open'}); this.analyser=null; this.dataArray=null; }
  connectedCallback() { this.render(); this._setupEvents(); }
  setAnalyser(analyser) {
    this.analyser = analyser; this.analyser.fftSize = 32;
    this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
    this._drawMeter();
  }
  updateDisplay(step) {
    const d = this.shadowRoot.querySelector('#step-display');
    if(d) d.textContent = `STEP:${String(step + 1).padStart(2, '0')}`;
  }
  _setupEvents() {
    const r = this.shadowRoot;
    r.querySelector('#start').addEventListener('click', () => this.dispatchEvent(new CustomEvent('transport', {detail:'start', bubbles:true, composed:true})));
    r.querySelector('#stop').addEventListener('click', () => this.dispatchEvent(new CustomEvent('transport', {detail:'stop', bubbles:true, composed:true})));
    r.querySelector('#metro').addEventListener('change', (e) => this.dispatchEvent(new CustomEvent('metro-toggle', {detail:e.detail.active, bubbles:true, composed:true})));
    r.querySelector('#tempo').addEventListener('bpm-change', (e) => this.dispatchEvent(new CustomEvent('bpm-change', {detail: e.detail, bubbles: true, composed: true})));
  }
  _drawMeter() {
    if(!this.analyser) return;
    this.analyser.getByteFrequencyData(this.dataArray);
    let total = 0; for(let i=0; i<this.dataArray.length; i++) total += this.dataArray[i];
    const avg = total / this.dataArray.length;
    const canvas = this.shadowRoot.querySelector('#vu');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#050508'; ctx.fillRect(0,0,canvas.width,canvas.height);
    const w = (avg / 255) * canvas.width * 1.5;
    const grad = ctx.createLinearGradient(0,0,canvas.width,0);
    grad.addColorStop(0, '#00f3ff'); grad.addColorStop(0.7, '#ffcc00'); grad.addColorStop(1, '#ff0055');
    ctx.fillStyle = grad; ctx.fillRect(0,0,Math.min(w,canvas.width),canvas.height);
    requestAnimationFrame(() => this._drawMeter());
  }
  render() {
    this.shadowRoot.innerHTML = `

        :host { display: block; background: #0c0c14; padding: 10px 16px; border-radius: 6px; border: 1px solid #1a1a26; }

// XModalSynth — динамическая модалка
class XModalSynth extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({mode:'open'});
    this.targetId = null;
    this.currentPlugin = null;
    this.currentParams = null;
  }
  connectedCallback() {
    this.render();
    this._setupEvents();
  }
  open(trackId, label, plugin, currentParams) {
    this.targetId = trackId;
    this.currentPlugin = plugin;
    this.currentParams = currentParams;
    this.shadowRoot.querySelector('.title').textContent = `EDIT: ${label.toUpperCase()}`;
    const paramsContainer = this.shadowRoot.querySelector('.params');
    paramsContainer.innerHTML = '';
    const groups = {};
    plugin.params.forEach(p => {
      const g = p.group || 'Main';
      if (!groups[g]) groups[g] = [];
      groups[g].push(p);
    });
    Object.entries(groups).forEach(([groupName, params]) => {
      const groupEl = document.createElement('div');
      groupEl.className = 'param-group';
      groupEl.innerHTML = `<div class="group-title">${groupName}</div><div class="group-controls"></div>`;
      const controls = groupEl.querySelector('.group-controls');
      params.forEach(p => {
        const control = this._createControl(p, currentParams[p.id]);
        controls.appendChild(control);
      });
      paramsContainer.appendChild(groupEl);
    });
    if (plugin.presets && plugin.presets.length > 0) {
      const presetsEl = document.createElement('div');
      presetsEl.className = 'param-group';
      presetsEl.innerHTML = `<div class="group-title">PRESETS</div><div class="preset-list"></div>`;
      const list = presetsEl.querySelector('.preset-list');
      plugin.presets.forEach(preset => {
        const btn = document.createElement('button');
        btn.className = 'preset-btn';
        btn.textContent = preset.name;
        btn.onclick = () => this._applyPreset(preset);
        list.appendChild(btn);
      });
      paramsContainer.appendChild(presetsEl);
    }
    this.shadowRoot.querySelector('dialog').showModal();
  }
  _createControl(param, currentValue) {
    const value = currentValue !== undefined ? currentValue : param.default;
    let el;
    switch (param.type) {
      case 'knob':
        el = document.createElement('x-knob');
        el.id = param.id;
        el.setAttribute('min', param.min);
        el.setAttribute('max', param.max);
        el.setAttribute('value', value);
        el.setAttribute('default', param.default);
        el.setAttribute('label', param.label);
        if (param.unit) el.setAttribute('unit', param.unit);
        if (param.taper) el.setAttribute('taper', param.taper);
        if (param.color) el.setAttribute('color', param.color);
        break;
      case 'select':
        el = document.createElement('x-select');
        el.id = param.id;
        el.setAttribute('options', JSON.stringify(param.options));
        el.setAttribute('value', value);
        el.setAttribute('label', param.label);
        break;
      case 'toggle':
        el = document.createElement('x-toggle');
        el.id = param.id;
        el.setAttribute('value', value);
        el.setAttribute('label', param.label);
        break;
      case 'envelope':
        el = document.createElement('x-envelope');
        el.id = param.id;
        el.setAttribute('value', JSON.stringify(value));
        el.setAttribute('label', param.label);
        break;
      case 'wave':
        const wrap = document.createElement('div');
        wrap.style.display = 'flex';
        wrap.style.flexDirection = 'column';
        wrap.style.alignItems = 'center';
        wrap.style.gap = '4px';
        const preview = document.createElement('x-waveform-preview');
        preview.setAttribute('wave', value);
        const select = document.createElement('x-select');
        select.id = param.id;
        select.setAttribute('options', JSON.stringify(param.options));
        select.setAttribute('value', value);
        select.setAttribute('label', param.label);
        select.addEventListener('input', (e) => {
          preview.setAttribute('wave', e.detail.value);
          this._emitChange(param.id, e.detail.value);
        });
        wrap.appendChild(preview);
        wrap.appendChild(select);
        return wrap;
    }
    if (el) {
      el.addEventListener('input', (e) => {
        this._emitChange(param.id, e.detail.value);
      });
    }
    return el;
  }
  _emitChange(paramId, value) {
    this.currentParams[paramId] = value;
    this.dispatchEvent(new CustomEvent('synth-change', {
      detail: { trackId: this.targetId, param: paramId, value: value },
      bubbles: true, composed: true
    }));
  }
  _applyPreset(preset) {
    Object.entries(preset.params).forEach(([k, v]) => {
      this.currentParams[k] = v;
      const el = this.shadowRoot.querySelector(`[id="${k}"]`);
      if (el) {
        if (el.tagName === 'X-KNOB' || el.tagName === 'X-TOGGLE') el.setAttribute('value', v);
        else if (el.tagName === 'X-SELECT') el.setAttribute('value', v);
        else if (el.tagName === 'X-ENVELOPE') el.setAttribute('value', JSON.stringify(v));
      }
      this._emitChange(k, v);
    });
  }
  _setupEvents() {
    const d = this.shadowRoot.querySelector('dialog');
    this.shadowRoot.querySelector('#close').addEventListener('click', () => d.close());
  }
  render() {

        #close {

// ==========================================
// MAIN ORCHESTRATOR
// ==========================================
class XSequencer extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({mode:'open'});
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterAnalyser = this.ctx.createAnalyser();
    this.delay = new DelayEffect(this.ctx);
    this.recordDest = this.ctx.createMediaStreamDestination();
    this.delay.output.connect(this.masterAnalyser);
    this.masterAnalyser.connect(this.ctx.destination);
    this.masterAnalyser.connect(this.recordDest);
    this.scheduler = new SequencerScheduler(this.ctx, (step, time) => this._process(step, time));
    this.tracks = [];
    this.metro = false;
    this.recorder = null;
    this.chunks = [];
    this.registry = window.CYBER_DAW.registry;
    this._initRecorder();
  }
  connectedCallback() {
    this.render();
    this.shadowRoot.querySelector('x-master-bar').setAnalyser(this.masterAnalyser);
    this._bindEvents();
    this._updatePluginList();
    
    // Ждем загрузки плагинов перед инициализацией треков
    this._waitForPlugins().then(() => {
      this._updatePluginList();
      this._add('drum.kick808', 'Kick');
      this._add('drum.snare', 'Snare');
      this._add('synth.subtractive', 'Bass');
    });
  }

  _waitForPlugins() {
    return new Promise(resolve => {
      const check = () => {
        const required = ['drum.kick808', 'drum.snare', 'synth.subtractive'];
        const loaded = required.every(id => this.registry.get(id));
        if (loaded) resolve();
        else setTimeout(check, 50);
      };
      check();
    });
  }

  _updatePluginList() {
    const addBar = this.shadowRoot.querySelector('x-add-track-bar');
    if (addBar) {
      const plugins = this.registry.getAll();
      if (plugins.length > 0) {
        addBar.setPlugins(plugins);
      }
    }
  }
  _add(pluginId, label, matrix, params) {
    const plugin = this.registry.get(pluginId);
    if (!plugin) { console.error(`Plugin not found: ${pluginId}`); return; }
    const gain = this.ctx.createGain();
    const pan = this.ctx.createStereoPanner();
    gain.connect(pan);
    pan.connect(this.delay.input);
    const defaults = {};
    plugin.params.forEach(p => { defaults[p.id] = p.default; });
    this.tracks.push({
      id: 't_'+Date.now()+Math.random().toString(36).substr(2,4),
      pluginId, label, mute: false, gain, pan,
      matrix: matrix || Array(this.scheduler.maxSteps).fill(plugin.category === 'drum' ? false : 0),
      params: { ...defaults, ...params }
    });
    plugin.init(this.ctx, gain);
    this._refreshUI();
  }
  _remove(id) {
    const i = this.tracks.findIndex(t => t.id===id);
    if (i===-1) return;
    this.tracks[i].gain.disconnect();
    this.tracks[i].pan.disconnect();
    this.tracks.splice(i,1);
    this._refreshUI();
  }
  _refreshUI() {
    const c = this.shadowRoot.querySelector('#tracks-container');
    if (!c) return;
    const total = this.scheduler.maxSteps;
    c.innerHTML = this.tracks.map(t => {
      const plugin = this.registry.get(t.pluginId);
      const isDrum = plugin && plugin.category === 'drum';
      const isPoly = t.pluginId === 'synth.poly';
      const cells = Array(total).fill(null).map((_,i) => {
        if (isPoly) return `<x-chord-selector data-track-id="${t.id}" data-step="${i}"></x-chord-selector>`;
        if (!isDrum) return `<x-note-selector data-track-id="${t.id}" data-step="${i}" data-freq="${t.matrix[i]||0}"></x-note-selector>`;
        const grp = Math.floor(i/4)%2===1 ? 'B' : 'A';
        return `<x-pad data-track-id="${t.id}" data-step="${i}" color-group="${grp}" ${t.matrix[i]?'active':''}></x-pad>`;
      }).join('');
      return `<div class="track-row"><x-channel-strip track-id="${t.id}" label="${t.label}"></x-channel-strip><div class="pads-container" style="overflow-x:auto; max-width:100%;">${cells}</div></div>`;
    }).join('');
  }
  _bindEvents() {
    const r = this.shadowRoot;
    r.querySelector('x-master-bar').addEventListener('transport', e => {
      if (e.detail==='start') { this.ctx.resume(); this.scheduler.start(); }
      else this.scheduler.stop();
    });
    r.querySelector('x-master-bar').addEventListener('bpm-change', e => this.scheduler.bpm = e.detail.bpm);
    r.querySelector('x-master-bar').addEventListener('metro-toggle', e => this.metro = e.detail);
    r.querySelector('x-add-track-bar').addEventListener('add-track', e => {
      const pluginId = e.detail.pluginId;
      const plugin = this.registry.get(pluginId);
      if (!plugin) return;
      const cnt = this.tracks.filter(t=>t.pluginId===pluginId).length+1;
      this._add(pluginId, `${plugin.name} ${cnt}`);
    });
    r.addEventListener('delete-track', e => this._remove(e.detail.trackId));
    r.addEventListener('toggle', e => {
      if (e.target.tagName==='X-PAD') {
        const t = this.tracks.find(x=>x.id===e.target.dataset.trackId);
        if (t) t.matrix[parseInt(e.target.dataset.step)] = e.detail.active;
      }
    });
    r.addEventListener('note-change', e => {
      if (e.target.tagName==='X-NOTE-SELECTOR') {
        const t = this.tracks.find(x=>x.id===e.target.dataset.trackId);
        if (t) t.matrix[parseInt(e.target.dataset.step)] = e.detail.freq;
      }
    });
    r.addEventListener('chord-change', e => {
      if (e.target.tagName==='X-CHORD-SELECTOR') {
        const t = this.tracks.find(x=>x.id===e.target.dataset.trackId);
        if (t) t.matrix[parseInt(e.target.dataset.step)] = e.detail.chordName;
      }
    });
    r.addEventListener('channel-change', e => {
      const t = this.tracks.find(x=>x.id===e.detail.trackId);
      if (!t) return;
      if (e.detail.param==='gain') t.gain.gain.linearRampToValueAtTime(e.detail.value/100, this.ctx.currentTime+0.05);
      if (e.detail.param==='pan') t.pan.pan.linearRampToValueAtTime(e.detail.value/100, this.ctx.currentTime+0.05);
      if (e.detail.param==='mute') t.mute = e.detail.value===1;
    });
    r.addEventListener('open-settings', e => {
      const track = this.tracks.find(t => t.id === e.detail.trackId);
      if (!track) return;
      const plugin = this.registry.get(track.pluginId);
      r.querySelector('x-modal-synth').open(track.id, track.label, plugin, track.params);
    });
    r.addEventListener('synth-change', e => {
      const t = this.tracks.find(x=>x.id===e.detail.trackId);
      if (t) t.params[e.detail.param] = e.detail.value;
    });
    r.querySelector('.length-selector').addEventListener('click', e => {
      if (!e.target.classList.contains('len-btn')) return;
      r.querySelectorAll('.len-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const newLen = parseInt(e.target.dataset.len);
      this.scheduler.maxSteps = newLen;
      this.tracks.forEach(t => {
        const plugin = this.registry.get(t.pluginId);
        const isDrum = plugin && plugin.category === 'drum';
        const curr = t.matrix.length;
        if (newLen > curr) {
          const extra = Array(newLen - curr).fill(isDrum ? false : 0);
          t.matrix = t.matrix.concat(extra);
        } else if (newLen < curr) {
          t.matrix = t.matrix.slice(0, newLen);
        }
      });
      this._refreshUI();
    });
    r.querySelector('x-fx-panel').addEventListener('fx-change', e => this.delay.set(e.detail.param, e.detail.value));
    r.querySelector('x-storage-panel').addEventListener('storage', e => {
      if (e.detail==='save') {
        localStorage.setItem('cyber_daw_v2', JSON.stringify({
          tracks: this.tracks.map(t=>({pluginId:t.pluginId,label:t.label,matrix:t.matrix,params:t.params})),
          bpm: this.scheduler.bpm,
          maxSteps: this.scheduler.maxSteps
        }));
        alert('Saved!');
      } else {
        const d = JSON.parse(localStorage.getItem('cyber_daw_v2'));
        if (!d) return alert('No data');
        this.tracks = [];
        this.scheduler.maxSteps = d.maxSteps || 16;
        d.tracks.forEach(t => this._add(t.pluginId, t.label, t.matrix, t.params));
        this.scheduler.bpm = d.bpm;
        this._refreshUI();
        const btns = this.shadowRoot.querySelectorAll('.len-btn');
        btns.forEach(b => { if (parseInt(b.dataset.len) === this.scheduler.maxSteps) b.classList.add('active'); else b.classList.remove('active'); });
        alert('Loaded!');
      }
    });
    r.querySelector('x-recorder-button').addEventListener('rec-toggle', e => {
      if (e.detail) { this.chunks=[]; this.recorder.start(); this.ctx.resume(); this.scheduler.start(); }
      else { this.recorder.stop(); this.scheduler.stop(); }
    });
  }
  _process(globalStep, time) {
    const step = globalStep % this.scheduler.maxSteps;
    requestAnimationFrame(() => {
      this.shadowRoot.querySelector('x-master-bar').updateDisplay(step);
      this.shadowRoot.querySelectorAll('x-pad,x-note-selector,x-chord-selector').forEach(e=>e.removeAttribute('playing'));
      this.shadowRoot.querySelectorAll(`[data-step="${step}"]`).forEach(e=>e.setAttribute('playing',''));
    });
    if (this.metro && step%4===0) {
      const o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.connect(g); g.connect(this.ctx.destination);
      o.frequency.setValueAtTime(step===0?1000:600, time);
      g.gain.setValueAtTime(0.1, time); g.gain.exponentialRampToValueAtTime(0.001, time+0.05);
      o.start(time); o.stop(time+0.05);
    }
    this.tracks.forEach(t => {
      if (t.mute) return;
      const plugin = this.registry.get(t.pluginId);
      if (!plugin) return;
      const value = t.matrix[step];
      if (!value && value !== 0) return;
      plugin.trigger(time, value, t.params, t.gain);
    });
  }
  _initRecorder() {
    this.recorder = new MediaRecorder(this.recordDest.stream);
    this.recorder.ondataavailable = e => { if (e.data.size>0) this.chunks.push(e.data); };
    this.recorder.onstop = () => {
      const blob = new Blob(this.chunks, {type:'audio/webm'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `cyber-daw-v2-${Date.now()}.webm`; a.click();
      this.chunks = [];
    };
  }
  render() {
    this.shadowRoot.innerHTML = `
      <style>
        :host { display:block; background:#06060a; padding:20px; border-radius:12px; width:fit-content; max-width:100%; box-shadow:0 20px 50px rgba(0,0,0,0.9); font-family:var(--font-mono); }
        .main-grid { display:flex; flex-direction:column; gap:16px; margin:16px 0; }
        .tracks-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px dashed #222; padding-bottom:6px; flex-wrap:wrap; gap:8px; }
        .tracks-header span { font-size:10px; color:var(--neon-cyan); font-weight:bold; letter-spacing:1px; text-shadow:0 0 4px rgba(0,243,255,0.4); }
        .length-selector { display:flex; gap:4px; background:#0d0d14; padding:4px; border-radius:4px; border:1px solid #222233; }
        .len-btn { background:#14141f; color:#555577; border:1px solid #252538; padding:4px 8px; font-size:10px; font-weight:bold; cursor:pointer; border-radius:3px; font-family:monospace; }
        .len-btn.active { color:#fff; background:#ff0055; border-color:#ff0055; box-shadow:0 0 8px #ff0055; }
        #tracks-container { display:flex; flex-direction:column; gap:8px; }
        .track-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .pads-container { display:flex; gap:3px; background:#050508; padding:4px; border-radius:4px; border:1px solid #14141f; flex-wrap:nowrap; overflow-x:auto; max-width:100%; }
        .bottom-bar { display:flex; gap:16px; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; }
        .utils { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        @media (max-width:700px) { :host{padding:10px} .main-grid{gap:10px} .track-row{flex-direction:column;align-items:flex-start;gap:4px} .pads-container{justify-content:flex-start} .bottom-bar{flex-direction:column;gap:10px} .bottom-bar>*{width:100%} }
        .pads-container::-webkit-scrollbar { height: 6px; }
        .pads-container::-webkit-scrollbar-track { background: #0a0a0f; border-radius: 3px; }
        .pads-container::-webkit-scrollbar-thumb { background: linear-gradient(90deg, #ff0055, #00f3ff); border-radius: 3px; box-shadow: inset 0 0 4px rgba(0,0,0,0.8); }
        .pads-container::-webkit-scrollbar-thumb:hover { background: linear-gradient(90deg, #00f3ff, #ff0055); }
        .pads-container { scrollbar-width: thin; scrollbar-color: #ff0055 #0a0a0f; }
      </style>
      <x-rgb-panel><x-master-bar></x-master-bar></x-rgb-panel>
      <div class="main-grid">
        <x-rgb-panel>
          <div class="tracks-header">
            <span>STEP SEQUENCER / PLUGIN HOST</span>
            <div style="display:flex; gap:8px; align-items:center;">
              <div class="length-selector">
                <button class="len-btn active" data-len="16">16</button>
                <button class="len-btn" data-len="32">32</button>
                <button class="len-btn" data-len="48">48</button>
                <button class="len-btn" data-len="64">64</button>
              </div>
              <x-add-track-bar></x-add-track-bar>
            </div>
          </div>
          <div id="tracks-container"></div>
        </x-rgb-panel>
      </div>
      <div class="bottom-bar">
        <x-rgb-panel><x-fx-panel></x-fx-panel></x-rgb-panel>
        <x-rgb-panel>
          <div class="utils">
            <x-storage-panel></x-storage-panel>
            <x-recorder-button></x-recorder-button>
          </div>
        </x-rgb-panel>
      </div>
      <x-modal-synth></x-modal-synth>
    `;
  }
}
