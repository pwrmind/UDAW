<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CYBER-DAW // Step Sequencer with Pattern Length</title>
<style>
  :root {
    --bg-main: #030305;
    --bg-panel: #0a0a0f;
    --bg-element: #14141f;
    --border-color: #222233;
    --neon-cyan: #00f3ff;
    --neon-magenta: #ff0055;
    --neon-green: #39ff14;
    --neon-orange: #ff9900;
    --text-dim: #555577;
    --text-light: #8888aa;
    --font-mono: 'Courier New', Courier, monospace;
  }
  body {
    background: var(--bg-main);
    background-image: radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.05) 0%, transparent 50%);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; margin: 0;
    font-family: var(--font-mono); color: #fff;
    overflow-x: hidden;
  }
  @media (max-width: 800px) { body { padding: 10px; } }
</style>
</head>
<body>

<x-sequencer></x-sequencer>

<script type="module">
// ==========================================
// 1. AUDIO ENGINE (9 синтезаторов)
// ==========================================
class DrumSynth {
  constructor(ctx) { this.ctx = ctx; }
  playKick(time, out, p = {}) {
    const d = (p.decay || 300) / 1000, m = (p.envMod || 50) / 100;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.connect(g); g.connect(out);
    o.frequency.setValueAtTime(150, time);
    o.frequency.exponentialRampToValueAtTime(0.01, time + d * (1 + m * 2));
    g.gain.setValueAtTime(1, time);
    g.gain.exponentialRampToValueAtTime(0.01, time + d * (1 + m * 2));
    o.start(time); o.stop(time + d * (1 + m * 2));
  }
  playSnare(time, out, p = {}) {
    const d = (p.decay || 200) / 1000, m = (p.envMod || 50) / 100;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * (d + m * 0.3), this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource(); noise.buffer = buf;
    const f = this.ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1000;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.7, time); g.gain.exponentialRampToValueAtTime(0.01, time + d * (1 + m));
    noise.connect(f); f.connect(g); g.connect(out);
    noise.start(time); noise.stop(time + d * (1 + m));
  }
  playHihat(time, out, p = {}) {
    const d = (p.decay || 80) / 1000;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * d, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource(); noise.buffer = buf;
    const f = this.ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 5000;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.5, time); g.gain.exponentialRampToValueAtTime(0.01, time + d);
    noise.connect(f); f.connect(g); g.connect(out);
    noise.start(time); noise.stop(time + d);
  }
  playTom(time, out, p = {}) {
    const d = (p.decay || 400) / 1000, m = (p.envMod || 50) / 100;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.connect(g); g.connect(out);
    o.frequency.setValueAtTime(120, time);
    o.frequency.exponentialRampToValueAtTime(0.01, time + d * (1 + m));
    g.gain.setValueAtTime(0.8, time);
    g.gain.exponentialRampToValueAtTime(0.01, time + d * (1 + m));
    o.start(time); o.stop(time + d * (1 + m));
  }
}

class SynthVoice {
  constructor(ctx) { this.ctx = ctx; }
  playNote(freq, time, out, p = {}) {
    if (!freq) return;
    const d = (p.decay || 200) / 1000, m = (p.envMod || 50) / 100;
    const o = this.ctx.createOscillator(), f = this.ctx.createBiquadFilter(), g = this.ctx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(freq, time);
    f.type = 'lowpass'; f.Q.setValueAtTime(10 + m * 10, time);
    f.frequency.setValueAtTime(1200, time);
    f.frequency.exponentialRampToValueAtTime(150 - m * 50, time + d * 0.8);
    g.gain.setValueAtTime(0.4, time); g.gain.exponentialRampToValueAtTime(0.01, time + d * (1 + m));
    o.connect(f); f.connect(g); g.connect(out);
    o.start(time); o.stop(time + d * (1 + m));
  }
}

class PolySynth {
  constructor(ctx) {
    this.ctx = ctx;
    this.chords = {
      'OFF': [],
      'Min7': [130.81, 155.56, 196.00, 233.08],
      'Maj7': [130.81, 164.81, 196.00, 246.94],
      'Sus4': [146.83, 196.00, 220.00, 293.66],
      'Dim':  [116.54, 138.59, 164.81, 233.08]
    };
  }
  playChord(name, time, out) {
    const freqs = this.chords[name];
    if (!freqs || freqs.length === 0) return;
    const mainGain = this.ctx.createGain();
    mainGain.gain.setValueAtTime(0.25, time);
    mainGain.gain.exponentialRampToValueAtTime(0.001, time + 0.8);
    freqs.forEach(f => {
      const o = this.ctx.createOscillator();
      o.type = 'triangle'; o.frequency.setValueAtTime(f, time);
      o.detune.setValueAtTime(Math.random() * 10 - 5, time);
      o.connect(mainGain); o.start(time); o.stop(time + 0.8);
    });
    mainGain.connect(out);
  }
}

class ExtendedSynths {
  constructor(ctx) { this.ctx = ctx; }
  playFMBell(freq, time, out) {
    if (!freq) return;
    const carrier = this.ctx.createOscillator(), modulator = this.ctx.createOscillator();
    const modGain = this.ctx.createGain(), gain = this.ctx.createGain();
    carrier.type = 'sine'; modulator.type = 'sine';
    carrier.frequency.setValueAtTime(freq, time);
    modulator.frequency.setValueAtTime(freq * 1.414, time);
    modGain.gain.setValueAtTime(800, time);
    modGain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
    gain.gain.setValueAtTime(0.4, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.6);
    modulator.connect(modGain); modGain.connect(carrier.frequency);
    carrier.connect(gain); gain.connect(out);
    modulator.start(time); carrier.start(time);
    modulator.stop(time + 0.6); carrier.stop(time + 0.6);
  }
  playNoiseSweep(time, out) {
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 1.0, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource(); noise.buffer = buf;
    const f = this.ctx.createBiquadFilter(); f.type = 'bandpass'; f.Q.setValueAtTime(5, time);
    f.frequency.setValueAtTime(200, time);
    f.frequency.exponentialRampToValueAtTime(7000, time + 0.9);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.3, time); g.gain.linearRampToValueAtTime(0.001, time + 1.0);
    noise.connect(f); f.connect(g); g.connect(out);
    noise.start(time); noise.stop(time + 1.0);
  }
  playSubBass(freq, time, out) {
    if (!freq) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(freq / 4, time);
    g.gain.setValueAtTime(0.6, time); g.gain.linearRampToValueAtTime(0.001, time + 0.4);
    o.connect(g); g.connect(out); o.start(time); o.stop(time + 0.4);
  }
  playChiptune(freq, time, out) {
    if (!freq) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(freq * 2, time);
    o.frequency.linearRampToValueAtTime(freq / 2, time + 0.1);
    g.gain.setValueAtTime(0.2, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    o.connect(g); g.connect(out); o.start(time); o.stop(time + 0.1);
  }
}

class DelayEffect {
  constructor(ctx) {
    this.ctx = ctx; this.input = ctx.createGain(); this.output = ctx.createGain();
    this.delay = ctx.createDelay(2.0); this.fb = ctx.createGain(); this.wet = ctx.createGain(); this.dry = ctx.createGain();
    this.input.connect(this.dry); this.dry.connect(this.output);
    this.input.connect(this.delay); this.delay.connect(this.wet); this.wet.connect(this.output);
    this.delay.connect(this.fb); this.fb.connect(this.delay);
    this.set('time', 300); this.set('feedback', 40); this.set('mix', 20);
  }
  set(p, v) {
    const t = this.ctx.currentTime;
    if (p === 'time') this.delay.delayTime.linearRampToValueAtTime(v/1000, t+0.05);
    if (p === 'feedback') this.fb.gain.linearRampToValueAtTime(v/100, t+0.05);
    if (p === 'mix') {
      const m = v/100;
      this.dry.gain.linearRampToValueAtTime(1-m, t+0.05);
      this.wet.gain.linearRampToValueAtTime(m, t+0.05);
    }
  }
}

class SequencerScheduler {
  constructor(ctx, cb) {
    this.ctx = ctx; this.cb = cb; this.bpm = 120; this.on = false; this.t = 0; this.step = 0;
    this.maxSteps = 16; // по умолчанию 16 шагов
  }
  start() { if (this.on) return; this.on = true; this.step = 0; this.t = this.ctx.currentTime; this._loop(); }
  stop() { this.on = false; clearTimeout(this.timer); }
  _loop() {
    while (this.t < this.ctx.currentTime + 0.1) { this.cb(this.step, this.t); this._next(); }
    this.timer = setTimeout(() => this._loop(), 25);
  }
  _next() {
    this.t += 0.25 * (60/this.bpm);
    this.step = (this.step + 1) % this.maxSteps; // зацикливание на maxSteps
  }
}

// ==========================================
// 2. UI COMPONENTS (полный набор)
// ==========================================
class XKnob extends HTMLElement {
  static get observedAttributes() { return ['min', 'max', 'value', 'label']; }
  constructor() { super(); this.attachShadow({mode:'open'}); this.startY=0; this.startVal=0; }
  connectedCallback() { this._updateProps(); this.render(); this._setupEvents(); }
  attributeChangedCallback() { this._updateProps(); this._updateVisuals(); }
  _updateProps() {
    this.min = parseFloat(this.getAttribute('min')) || 0;
    this.max = parseFloat(this.getAttribute('max')) || 100;
    this.value = parseFloat(this.getAttribute('value')) || 50;
    this.label = this.getAttribute('label') || '';
  }
  _setupEvents() {
    const knob = this.shadowRoot.querySelector('.knob-circle');
    if (!knob) return;
    const onMove = (e) => {
      const deltaY = this.startY - e.clientY;
      const range = this.max - this.min;
      let newVal = this.startVal + (deltaY / 150) * range;
      this.value = Math.max(this.min, Math.min(this.max, newVal));
      this._updateVisuals();
      this.dispatchEvent(new Event('input', {bubbles:true}));
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    knob.addEventListener('mousedown', (e) => {
      e.preventDefault(); this.startY = e.clientY; this.startVal = this.value;
      document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
    });
    knob.addEventListener('touchstart', (e) => {
      e.preventDefault(); this.startY = e.touches[0].clientY; this.startVal = this.value;
      const onTouchMove = (ev) => {
        const deltaY = this.startY - ev.touches[0].clientY;
        const range = this.max - this.min;
        let newVal = this.startVal + (deltaY / 150) * range;
        this.value = Math.max(this.min, Math.min(this.max, newVal));
        this._updateVisuals();
        this.dispatchEvent(new Event('input', {bubbles:true}));
      };
      const onTouchEnd = () => { document.removeEventListener('touchmove', onTouchMove); document.removeEventListener('touchend', onTouchEnd); };
      document.addEventListener('touchmove', onTouchMove, {passive: false});
      document.addEventListener('touchend', onTouchEnd);
    });
  }
  _updateVisuals() {
    if(!this.shadowRoot) return;
    const pointer = this.shadowRoot.querySelector('.pointer');
    const valEl = this.shadowRoot.querySelector('.val');
    if(!pointer || !valEl) return;
    const percent = (this.value - this.min) / (this.max - this.min);
    const deg = -135 + percent * 270;
    pointer.style.transform = `rotate(${deg}deg)`;
    valEl.textContent = Math.round(this.value);
  }
  render() {
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-flex; flex-direction: column; align-items: center; width: 42px; user-select: none; }
        .label { font-size: 8px; color: var(--text-dim); margin-bottom: 2px; text-transform: uppercase; font-weight: bold; }
        .knob-circle { width: 26px; height: 26px; background: #1a1a26; border: 1px solid var(--border-color); border-radius: 50%; position: relative; cursor: ns-resize; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); }
        .pointer { width: 2px; height: 10px; background: var(--neon-cyan); position: absolute; top: 2px; left: 12px; transform-origin: bottom center; box-shadow: 0 0 4px var(--neon-cyan); }
        .val { font-size: 8px; color: var(--text-light); margin-top: 2px; font-weight: bold; }
      </style>
      <div class="label">${this.label}</div>
      <div class="knob-circle"><div class="pointer"></div></div>
      <div class="val">0</div>`;
    this._updateVisuals();
  }
}
customElements.define('x-knob', XKnob);

class XLedButton extends HTMLElement {
  static get observedAttributes() { return ['active', 'label']; }
  constructor() { super(); this.attachShadow({mode:'open'}); }
  connectedCallback() { this.render(); this.shadowRoot.querySelector('.btn').addEventListener('click', () => {
    this.toggleAttribute('active');
    this.dispatchEvent(new CustomEvent('change', {detail:{active:this.hasAttribute('active')}, bubbles:true, composed:true}));
  }); }
  attributeChangedCallback() {
    const btn = this.shadowRoot?.querySelector('.btn');
    const led = this.shadowRoot?.querySelector('.led');
    if(btn) btn.classList.toggle('active', this.hasAttribute('active'));
    if(led) led.classList.toggle('active', this.hasAttribute('active'));
  }
  render() {
    const label = this.getAttribute('label') || 'M';
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-block; user-select: none; }
        .btn { display: flex; align-items: center; gap: 4px; background: #1a1a26; border: 1px solid var(--border-color); border-radius: 3px; color: var(--text-dim); padding: 2px 6px; font-size: 9px; cursor: pointer; font-weight: bold; font-family: var(--font-mono); }
        .btn.active { color: #fff; border-color: var(--neon-magenta); }
        .led { width: 5px; height: 5px; background: #333; border-radius: 50%; }
        .led.active { background: var(--neon-magenta); box-shadow: 0 0 6px var(--neon-magenta); }
      </style>
      <div class="btn"><div class="led"></div><span>${label}</span></div>`;
    this.attributeChangedCallback();
  }
}
customElements.define('x-led-button', XLedButton);

class XPad extends HTMLElement {
  static get observedAttributes() { return ['active', 'playing', 'color-group']; }
  constructor() { super(); this.attachShadow({mode:'open'}); }
  connectedCallback() { this.render(); this.shadowRoot.querySelector('.pad').addEventListener('click', () => {
    this.toggleAttribute('active');
    this.dispatchEvent(new CustomEvent('toggle', {detail:{active:this.hasAttribute('active')}, bubbles:true, composed:true}));
  }); }
  attributeChangedCallback() {
    const pad = this.shadowRoot?.querySelector('.pad');
    if(!pad) return;
    pad.classList.toggle('active', this.hasAttribute('active'));
    pad.classList.toggle('playing', this.hasAttribute('playing'));
    pad.classList.toggle('group-b', this.getAttribute('color-group') === 'B');
  }
  render() {
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-block; }
        .pad { width: 22px; height: 22px; border-radius: 3px; cursor: pointer; transition: all 0.05s; box-shadow: inset 0 1px 3px rgba(0,0,0,0.6); background: #14141f; border: 1px solid #252538; }
        .pad.group-b { background: #1c1c2b; border-color: #2d2d42; }
        .pad.active { background: var(--neon-green) !important; border-color: var(--neon-green); box-shadow: 0 0 8px var(--neon-green), inset 0 0 4px #fff; }
        .pad.group-b.active { background: var(--neon-orange) !important; border-color: var(--neon-orange); box-shadow: 0 0 8px var(--neon-orange), inset 0 0 4px #fff; }
        .pad.playing { outline: 1.5px solid var(--neon-cyan); outline-offset: 1px; z-index: 5; transform: scale(1.05); }
      </style>
      <div class="pad"></div>`;
    this.attributeChangedCallback();
  }
}
customElements.define('x-pad', XPad);

class XNoteSelector extends HTMLElement {
  constructor() { 
    super(); this.attachShadow({mode:'open'});
    this.notes = [{l:'OFF',f:0},{l:'C2',f:65.41},{l:'D2',f:73.42},{l:'E2',f:82.41},{l:'G2',f:98.00},{l:'A2',f:110.00}];
    this.idx = 0;
  }
  connectedCallback() {
    const freq = parseFloat(this.dataset.freq) || 0;
    this.idx = this.notes.findIndex(n => Math.abs(n.f - freq) < 0.1);
    if(this.idx === -1) this.idx = 0;
    this.render();
    this.shadowRoot.querySelector('.cell').addEventListener('click', () => {
      this.idx = (this.idx + 1) % this.notes.length;
      this._updateVisuals();
      this.dispatchEvent(new CustomEvent('note-change', {detail:{freq:this.notes[this.idx].f}, bubbles:true, composed:true}));
    });
  }
  attributeChangedCallback() { this.shadowRoot?.querySelector('.cell')?.classList.toggle('playing', this.hasAttribute('playing')); }
  _updateVisuals() {
    const cell = this.shadowRoot.querySelector('.cell');
    if (!cell) return;
    cell.textContent = this.notes[this.idx].l;
    cell.classList.toggle('active', this.idx > 0);
  }
  render() {
    this.shadowRoot.innerHTML = `
      <style>
        .cell { width: 22px; height: 22px; background: #14141f; border: 1px solid #252538; border-radius: 3px; color: var(--text-dim); font-size: 9px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; font-family: var(--font-mono); }
        .cell.active { background: var(--neon-cyan) !important; color: #000; box-shadow: 0 0 8px var(--neon-cyan); border-color: var(--neon-cyan); }
        .cell.playing { outline: 1.5px solid var(--neon-magenta); outline-offset: 1px; z-index: 5; transform: scale(1.05); }
      </style>
      <div class="cell">OFF</div>`;
    this._updateVisuals();
  }
}
customElements.define('x-note-selector', XNoteSelector);

class XChordSelector extends HTMLElement {
  static get observedAttributes() { return ['playing']; }
  constructor() { super(); this.attachShadow({mode:'open'}); this.idx=0; this.chords=['OFF','Min7','Maj7','Sus4','Dim']; }
  connectedCallback() {
    this.render();
    this.shadowRoot.querySelector('.cell').addEventListener('click', () => {
      this.idx = (this.idx+1)%this.chords.length;
      this._upd();
      this.dispatchEvent(new CustomEvent('chord-change', {detail:{chordName:this.chords[this.idx]}, bubbles:true, composed:true}));
    });
  }
  attributeChangedCallback() { this.shadowRoot?.querySelector('.cell')?.classList.toggle('playing', this.hasAttribute('playing')); }
  _upd() {
    const c = this.shadowRoot.querySelector('.cell');
    if (!c) return;
    c.textContent = this.chords[this.idx];
    c.classList.toggle('active', this.idx>0);
  }
  render() {
    this.shadowRoot.innerHTML = `
      <style>
        .cell { width:32px; height:22px; background:#14141f; border:1px solid #33334d; color:#555577; font-size:8px; font-weight:900; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:3px; }
        .cell.active { background:#ff0055; color:#fff; box-shadow:0 0 8px #ff0055; }
        .cell.playing { outline:1.5px solid #00f3ff; transform:scale(1.05); }
      </style>
      <div class="cell">OFF</div>`;
    this._upd();
  }
}
customElements.define('x-chord-selector', XChordSelector);

class XChannelStrip extends HTMLElement {
  constructor() { super(); this.attachShadow({mode:'open'}); }
  connectedCallback() { this.render(); this._setupEvents(); }
  _setupEvents() {
    const trackId = this.getAttribute('track-id');
    this.shadowRoot.querySelector('x-led-button').addEventListener('change', (e) => this._emit('mute', e.detail.active ? 1 : 0, trackId));
    this.shadowRoot.addEventListener('input', (e) => { if(e.target.tagName === 'X-KNOB') this._emit(e.target.dataset.param, e.target.value, trackId); });
    this.shadowRoot.querySelector('.edit-btn').addEventListener('click', () => {
      this.dispatchEvent(new CustomEvent('open-settings', {detail:{trackId, label:this.getAttribute('label')}, bubbles:true, composed:true}));
    });
    this.shadowRoot.querySelector('.del-btn').addEventListener('click', () => {
      this.dispatchEvent(new CustomEvent('delete-track', {detail:{trackId}, bubbles:true, composed:true}));
    });
  }
  _emit(param, value, trackId) {
    this.dispatchEvent(new CustomEvent('channel-change', {detail:{trackId, param, value:parseFloat(value)}, bubbles:true, composed:true}));
  }
  render() {
    const label = this.getAttribute('label') || 'Track';
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: flex; align-items: center; background: #0d0d14; padding: 4px 8px; border-radius: 4px; border: 1px solid #1a1a26; gap: 6px; flex-wrap: wrap; }
        .track-name { width: 50px; font-size: 9px; font-weight: 900; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 0.5px; text-shadow: 0 0 4px rgba(0,243,255,0.3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .controls { display: flex; align-items: center; gap: 4px; }
        .edit-btn, .del-btn { background: none; border: 1px solid #333; color: var(--text-dim); cursor: pointer; font-size: 10px; border-radius: 3px; padding: 2px 4px; margin-left: 4px; }
        .edit-btn:hover { color: var(--neon-cyan); border-color: var(--neon-cyan); }
        .del-btn:hover { color: var(--neon-magenta); border-color: var(--neon-magenta); }
      </style>
      <div class="track-name">${label}</div>
      <div class="controls">
        <x-led-button label="MUTE"></x-led-button>
        <x-knob data-param="gain" min="0" max="100" value="80" label="VOL"></x-knob>
        <x-knob data-param="pan" min="-100" max="100" value="0" label="PAN"></x-knob>

class XTempoControl extends HTMLElement {
  static get observedAttributes() { return ['value']; }
  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this.bpm = 120; this.minBpm = 60; this.maxBpm = 200; this.tapTimes = [];
  }
  connectedCallback() {
    this.bpm = parseInt(this.getAttribute('value')) || 120;
    this.render();
    this.setupEvents();
  }
  attributeChangedCallback(name, oldValue, newValue) {
    if (name === 'value' && oldValue !== newValue) {
      this.bpm = Math.max(this.minBpm, Math.min(this.maxBpm, parseInt(newValue) || 120));
      this.updateDisplay();
    }
  }
  setupEvents() {
    const root = this.shadowRoot;
    root.querySelector('#bpm-up').addEventListener('click', () => this.changeBpm(1));
    root.querySelector('#bpm-down').addEventListener('click', () => this.changeBpm(-1));
    root.querySelector('#bpm-tap').addEventListener('click', () => {
      const now = performance.now();
      if (this.tapTimes.length > 0 && now - this.tapTimes[this.tapTimes.length - 1] > 2000) {
        this.tapTimes = [];
      }
      this.tapTimes.push(now);
      if (this.tapTimes.length >= 2) {
        let totalDeltas = 0;
        for (let i = 1; i < this.tapTimes.length; i++) totalDeltas += (this.tapTimes[i] - this.tapTimes[i - 1]);
        const averageDelta = totalDeltas / (this.tapTimes.length - 1);
        const calculatedBpm = Math.round(60000 / averageDelta);
        if (calculatedBpm >= this.minBpm && calculatedBpm <= this.maxBpm) {
          this.bpm = calculatedBpm;
          this.updateDisplay();
          this.emitBpmChange();
        }
      }
      if (this.tapTimes.length > 4) this.tapTimes.shift();
    });
  }
  changeBpm(amount) {
    const newBpm = this.bpm + amount;
    if (newBpm >= this.minBpm && newBpm <= this.maxBpm) {
      this.bpm = newBpm;
      this.updateDisplay();
      this.emitBpmChange();
    }
  }
  updateDisplay() {
    const display = this.shadowRoot.querySelector('.lcd-value');
    if (display) display.textContent = String(this.bpm).padStart(3, '0');
  }
  emitBpmChange() {
    this.dispatchEvent(new CustomEvent('bpm-change', {

      bubbles: true, composed: true
    }));
  }
  render() {

class XSequencer extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({mode:'open'});
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterAnalyser = this.ctx.createAnalyser();
    this.delay = new DelayEffect(this.ctx);
    this.recordDest = this.ctx.createMediaStreamDestination();
    this.delay.output.connect(this.masterAnalyser);
    this.masterAnalyser.connect(this.ctx.destination);
    this.masterAnalyser.connect(this.recordDest);
    this.drums = new DrumSynth(this.ctx);
    this.voice = new SynthVoice(this.ctx);
    this.poly = new PolySynth(this.ctx);
    this.ext = new ExtendedSynths(this.ctx);
    this.scheduler = new SequencerScheduler(this.ctx, (step, time) => this._process(step, time));
    this.tracks = [];
    this.metro = false;
    this.recorder = null;
    this.chunks = [];
    this._initRecorder();
  }
  connectedCallback() {
    this.render();
    this.shadowRoot.querySelector('x-master-bar').setAnalyser(this.masterAnalyser);
    this._bindEvents();
    this._add('kick', 'Kick');
    this._add('snare', 'Snare');
    this._add('bass', 'Bass');
  }
  _add(type, label, mtrx, timeline, params) {
    const gain = this.ctx.createGain(); const pan = this.ctx.createStereoPanner();
    gain.connect(pan); pan.connect(this.delay.input);
    const isMel = (type === 'bass' || type === 'synth' || type === 'fm' || type === 'sub' || type === 'chip');
    const isPoly = (type === 'poly');
    this.tracks.push({
      id: 't_'+Date.now()+Math.random().toString(36).substr(2,4),
      type, label, mute: false, gain, pan,
      matrix: mtrx || Array(this.scheduler.maxSteps).fill(isMel ? 0 : (isPoly ? 'OFF' : false)),
      synthParams: params || { decay: (type==='hat'?80:type==='noise'?500:300), envMod: 50 }
    });
    this._refreshUI();
  }
  _remove(id) {
    const i = this.tracks.findIndex(t => t.id===id);
    if (i===-1) return;
    this.tracks[i].gain.disconnect();
    this.tracks[i].pan.disconnect();
    this.tracks.splice(i,1);
    this._refreshUI();
  }
  _refreshUI() {
    const c = this.shadowRoot.querySelector('#tracks-container');
    if (!c) return;
    const total = this.scheduler.maxSteps;
    c.innerHTML = this.tracks.map(t => {
      const isMel = (t.type==='bass'||t.type==='synth'||t.type==='fm'||t.type==='sub'||t.type==='chip');
      const isPoly = (t.type==='poly');
      const cells = Array(total).fill(null).map((_,i) => {
        if (isPoly) return `<x-chord-selector data-track-id="${t.id}" data-step="${i}"></x-chord-selector>`;
        if (isMel) return `<x-note-selector data-track-id="${t.id}" data-step="${i}" data-freq="${t.matrix[i]||0}"></x-note-selector>`;
        const grp = Math.floor(i/4)%2===1 ? 'B' : 'A';
        return `<x-pad data-track-id="${t.id}" data-step="${i}" color-group="${grp}" ${t.matrix[i]?'active':''}></x-pad>`;
      }).join('');
      return `<div class="track-row"><x-channel-strip track-id="${t.id}" label="${t.label}"></x-channel-strip><div class="pads-container" style="overflow-x:auto; max-width:100%;">${cells}</div></div>`;
    }).join('');
  }
  _bindEvents() {
    const r = this.shadowRoot;
    r.querySelector('x-master-bar').addEventListener('transport', e => {
      if (e.detail==='start') { this.ctx.resume(); this.scheduler.start(); }
      else this.scheduler.stop();
    });
    r.querySelector('x-master-bar').addEventListener('bpm-change', e => this.scheduler.bpm = e.detail.bpm);
    r.querySelector('x-master-bar').addEventListener('metro-toggle', e => this.metro = e.detail);
    r.querySelector('x-add-track-bar').addEventListener('add-track', e => {
      const type = e.detail.type;
      const cnt = this.tracks.filter(t=>t.type===type).length+1;
      const names = {kick:'Kick',snare:'Snare',hat:'HiHat',tom:'Tom',bass:'Bass',synth:'Synth',poly:'Poly',fm:'FM Bell',noise:'Noise',sub:'Sub',chip:'Chiptune'};
      this._add(type, `${names[type]||type} ${cnt}`);
    });
    r.addEventListener('delete-track', e => this._remove(e.detail.trackId));
    r.addEventListener('toggle', e => {
      if (e.target.tagName==='X-PAD') {
        const t = this.tracks.find(x=>x.id===e.target.dataset.trackId);
        if (t) t.matrix[parseInt(e.target.dataset.step)] = e.detail.active;
      }
    });
    r.addEventListener('note-change', e => {
      if (e.target.tagName==='X-NOTE-SELECTOR') {
        const t = this.tracks.find(x=>x.id===e.target.dataset.trackId);
        if (t) t.matrix[parseInt(e.target.dataset.step)] = e.detail.freq;
      }
    });
    r.addEventListener('chord-change', e => {
      if (e.target.tagName==='X-CHORD-SELECTOR') {
        const t = this.tracks.find(x=>x.id===e.target.dataset.trackId);
        if (t) t.matrix[parseInt(e.target.dataset.step)] = e.detail.chordName;
      }
    });
    r.addEventListener('channel-change', e => {
      const t = this.tracks.find(x=>x.id===e.detail.trackId);
      if (!t) return;
      if (e.detail.param==='gain') t.gain.gain.linearRampToValueAtTime(e.detail.value/100, this.ctx.currentTime+0.05);
      if (e.detail.param==='pan') t.pan.pan.linearRampToValueAtTime(e.detail.value/100, this.ctx.currentTime+0.05);
      if (e.detail.param==='mute') t.mute = e.detail.value===1;
    });
    r.addEventListener('open-settings', e => r.querySelector('x-modal-synth').open(e.detail.trackId, e.detail.label));
    r.addEventListener('synth-change', e => {
      const t = this.tracks.find(x=>x.id===e.detail.trackId);
      if (t) t.synthParams[e.detail.param] = parseFloat(e.detail.value);
    });
    r.querySelector('.length-selector').addEventListener('click', e => {
      if (!e.target.classList.contains('len-btn')) return;
      r.querySelectorAll('.len-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const newLen = parseInt(e.target.dataset.len);
      this.scheduler.maxSteps = newLen;
      this.tracks.forEach(t => {
        const curr = t.matrix.length;
        if (newLen > curr) {
          const extra = Array(newLen - curr).fill((t.type==='bass'||t.type==='synth'||t.type==='fm'||t.type==='sub'||t.type==='chip')?0:(t.type==='poly'?'OFF':false));
          t.matrix = t.matrix.concat(extra);
        } else if (newLen < curr) {
          t.matrix = t.matrix.slice(0, newLen);
        }
      });
      this._refreshUI();
    });
    r.querySelector('x-fx-panel').addEventListener('fx-change', e => this.delay.set(e.detail.param, e.detail.value));
    r.querySelector('x-storage-panel').addEventListener('storage', e => {
      if (e.detail==='save') {
        localStorage.setItem('cyber_daw', JSON.stringify({tracks: this.tracks.map(t=>({type:t.type,label:t.label,matrix:t.matrix,synthParams:t.synthParams})), bpm: this.scheduler.bpm, maxSteps: this.scheduler.maxSteps}));
        alert('Saved!');
      } else {
        const d = JSON.parse(localStorage.getItem('cyber_daw'));
        if (!d) return alert('No data');
        this.tracks = [];
        this.scheduler.maxSteps = d.maxSteps || 16;
        d.tracks.forEach(t => this._add(t.type, t.label, t.matrix, undefined, t.synthParams));
        this.scheduler.bpm = d.bpm;
        this._refreshUI();
        const btns = this.shadowRoot.querySelectorAll('.len-btn');
        btns.forEach(b => { if (parseInt(b.dataset.len) === this.scheduler.maxSteps) b.classList.add('active'); else b.classList.remove('active'); });
        alert('Loaded!');
      }
    });
    r.querySelector('x-recorder-button').addEventListener('rec-toggle', e => {
      if (e.detail) { this.chunks=[]; this.recorder.start(); this.ctx.resume(); this.scheduler.start(); }
      else { this.recorder.stop(); this.scheduler.stop(); }
    });
  }
  _process(globalStep, time) {
    const step = globalStep % this.scheduler.maxSteps;
    requestAnimationFrame(() => {
      this.shadowRoot.querySelector('x-master-bar').updateDisplay(step);
      this.shadowRoot.querySelectorAll('x-pad,x-note-selector,x-chord-selector').forEach(e=>e.removeAttribute('playing'));
      this.shadowRoot.querySelectorAll(`[data-step="${step}"]`).forEach(e=>e.setAttribute('playing',''));
    });
    if (this.metro && step%4===0) {
      const o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.connect(g); g.connect(this.ctx.destination);
      o.frequency.setValueAtTime(step===0?1000:600, time);
      g.gain.setValueAtTime(0.1, time); g.gain.exponentialRampToValueAtTime(0.001, time+0.05);
      o.start(time); o.stop(time+0.05);
    }
    this.tracks.forEach(t => {
      if (t.mute) return;
      const v = t.matrix[step];
      const out = t.gain, p = t.synthParams;
      if (t.type==='kick' && v) this.drums.playKick(time, out, p);
      if (t.type==='snare' && v) this.drums.playSnare(time, out, p);
      if (t.type==='hat' && v) this.drums.playHihat(time, out, p);
      if (t.type==='tom' && v) this.drums.playTom(time, out, p);
      if ((t.type==='bass'||t.type==='synth') && v>0) this.voice.playNote(v, time, out, p);
      if (t.type==='poly' && v!=='OFF') this.poly.playChord(v, time, out);
      if (t.type==='fm' && v>0) this.ext.playFMBell(v, time, out);
      if (t.type==='noise' && v) this.ext.playNoiseSweep(time, out);
      if (t.type==='sub' && v>0) this.ext.playSubBass(v, time, out);
      if (t.type==='chip' && v>0) this.ext.playChiptune(v, time, out);
    });
  }
  _initRecorder() {
    this.recorder = new MediaRecorder(this.recordDest.stream);
    this.recorder.ondataavailable = e => { if (e.data.size>0) this.chunks.push(e.data); };
    this.recorder.onstop = () => {
      const blob = new Blob(this.chunks, {type:'audio/webm'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `cyber-daw-${Date.now()}.webm`; a.click();
      this.chunks = [];
    };
  }
  render() {
    this.shadowRoot.innerHTML = `
      <style>
        :host { display:block; background:#06060a; padding:20px; border-radius:12px; width:fit-content; max-width:100%; box-shadow:0 20px 50px rgba(0,0,0,0.9); font-family:var(--font-mono); }
        .main-grid { display:flex; flex-direction:column; gap:16px; margin:16px 0; }
        .tracks-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px dashed #222; padding-bottom:6px; flex-wrap:wrap; gap:8px; }
        .tracks-header span { font-size:10px; color:var(--neon-cyan); font-weight:bold; letter-spacing:1px; text-shadow:0 0 4px rgba(0,243,255,0.4); }
        .length-selector { display:flex; gap:4px; background:#0d0d14; padding:4px; border-radius:4px; border:1px solid #222233; }
        .len-btn { background:#14141f; color:#555577; border:1px solid #252538; padding:4px 8px; font-size:10px; font-weight:bold; cursor:pointer; border-radius:3px; font-family:monospace; }
        .len-btn.active { color:#fff; background:#ff0055; border-color:#ff0055; box-shadow:0 0 8px #ff0055; }
        #tracks-container { display:flex; flex-direction:column; gap:8px; }
        .track-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .pads-container { display:flex; gap:3px; background:#050508; padding:4px; border-radius:4px; border:1px solid #14141f; flex-wrap:nowrap; overflow-x:auto; max-width:100%; }
        .bottom-bar { display:flex; gap:16px; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; }
        .utils { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        @media (max-width:700px) { :host{padding:10px} .main-grid{gap:10px} .track-row{flex-direction:column;align-items:flex-start;gap:4px} .pads-container{justify-content:flex-start} .bottom-bar{flex-direction:column;gap:10px} .bottom-bar>*{width:100%} }
      </style>
      <x-rgb-panel><x-master-bar></x-master-bar></x-rgb-panel>
      <div class="main-grid">
        <x-rgb-panel>
          <div class="tracks-header">
            <span>STEP SEQUENCER / PIANO ROLL</span>
            <div style="display:flex; gap:8px; align-items:center;">
              <div class="length-selector">
                <button class="len-btn active" data-len="16">16</button>
                <button class="len-btn" data-len="32">32</button>
                <button class="len-btn" data-len="48">48</button>
                <button class="len-btn" data-len="64">64</button>
              </div>
              <x-add-track-bar></x-add-track-bar>
            </div>
          </div>
          <div id="tracks-container"></div>
        </x-rgb-panel>
      </div>
      <div class="bottom-bar">
        <x-rgb-panel><x-fx-panel></x-fx-panel></x-rgb-panel>
        <x-rgb-panel>
          <div class="utils">
            <x-storage-panel></x-storage-panel>
            <x-recorder-button></x-recorder-button>
          </div>
        </x-rgb-panel>
      </div>
      <x-modal-synth></x-modal-synth>
    `;
  }
}
customElements.define('x-sequencer', XSequencer);
</script>
</body>
